name: Build Installers

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            script: npm run dist:win -- --publish never
            artifact: bickspec-studio-windows-installers
            paths: |
              release/*.exe
              release/*.msi
              release/*.blockmap
              release/latest*.yml

          - os: macos-15-intel
            name: macos-intel-x64
            script: npm run build && npx electron-builder --mac dmg --x64 --publish never
            artifact: bickspec-studio-macos-intel-x64-installer
            paths: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest*.yml

          - os: macos-latest
            name: macos-apple-silicon-arm64
            script: npm run build && npx electron-builder --mac dmg --arm64 --publish never
            artifact: bickspec-studio-macos-apple-silicon-arm64-installer
            paths: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest*.yml

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Build installer
        run: ${{ matrix.script }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
