name: Build Installers

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: npm run dist:win
            artifact: bickspec-studio-windows-installers
          - os: macos-latest
            script: npm run dist:mac
            artifact: bickspec-studio-macos-installers

    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Build installers
        run: ${{ matrix.script }} -- --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
