name: Desktop Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and package scaffold
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck and build
        run: npm run build

      - name: Package directory
        run: npm run package:dir

      - name: Upload packaged app directory
        uses: actions/upload-artifact@v4
        with:
          name: bickspec-studio-windows-dir
          path: release/
          if-no-files-found: error
